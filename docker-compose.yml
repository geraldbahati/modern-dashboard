version: '3.9'

services:
  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3001/api/auth}
    network_mode: "host"
    environment:
      # Runtime environment variables
      - NODE_ENV=production
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL}
      - NEXT_PUBLIC_AUTH_URL=${NEXT_PUBLIC_AUTH_URL:-http://localhost:3001/api/auth}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped

  # Hono API Server (Bun runtime)
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile.standard
    network_mode: "host"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ARCJET_KEY=${ARCJET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    restart: unless-stopped

# Note: Using host network mode for cookie compatibility
# networks:
#   app-network:
#     driver: bridge
